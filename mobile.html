<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#DB0011" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MPF Demo" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Micro-Protection Fluid · Mobile | HSBC Life</title>
    <script src="./nfc-tap.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      async function boot() {
        const hasTap =
          new URLSearchParams(location.search).get('tap') ||
          /\/tap\/[^/?]+/.test(location.hash);

        if (hasTap && window.__MPF_RUN_NFC_TAP__) {
          await window.__MPF_RUN_NFC_TAP__();
        }

        if (!window.__MPF_SKIP_APP__) {
          await import('/src/main-mobile.jsx');
        }
      }

      boot();
    </script>
  </body>
</html>
