<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#DB0011" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MPF Demo" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Micro-Protection Fluid · Mobile | HSBC Life</title>
    <script>
      (function () {
        var p = new URLSearchParams(location.search);
        var tap = p.get('tap');
        var hm = location.hash.match(/\/tap\/([^/?]+)/);
        if (tap) sessionStorage.setItem('mpf-pending-tap', tap);
        else if (hm) sessionStorage.setItem('mpf-pending-tap', hm[1]);
        if (tap || hm) history.replaceState(null, '', location.pathname);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main-mobile.jsx"></script>
  </body>
</html>
