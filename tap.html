<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#DB0011" />
    <title>Micro-Protection Fluid</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body {
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #fafafa;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        text-align: center;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 1rem;
        padding: 2rem 1.5rem;
        max-width: 18rem;
      }
      .mark {
        width: 2.5rem;
        height: 2.5rem;
        margin: 0 auto 1rem;
        border-radius: 50%;
        background: #fff0f1;
        color: #db0011;
        font-size: 1.25rem;
        line-height: 2.5rem;
        font-weight: 700;
      }
      h1 { font-size: 1rem; margin-bottom: 0.35rem; }
      p { font-size: 0.85rem; color: #666; line-height: 1.45; }
    </style>
  </head>
  <body>
    <div class="card" id="status">
      <div class="mark">…</div>
      <h1>Sending signal</h1>
      <p>One moment</p>
    </div>
    <script src="./tap-bridge.js"></script>
  </body>
</html>
